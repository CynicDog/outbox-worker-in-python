services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: jobs
      POSTGRES_USER: worker
      POSTGRES_PASSWORD: worker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worker -d jobs"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "8652:8652"
    environment:
      DATABASE_URL: postgresql://worker:worker@db:5432/jobs
      WORKER_ID: worker-1
      POLL_INTERVAL: "5"
      MAX_WORKERS: "4"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
